services:
  parkeerhulp:
    build: .
    ports:
      - "3000:3000"
    environment:
      - EGIS_API_BASE_URL=https://api.parkeervergunningen.egisparkingservices.nl/api
      - EGIS_USERNAME=${EGIS_USERNAME}
      - EGIS_PASSWORD=${EGIS_PASSWORD}
      - APP_PIN=${APP_PIN}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - DATABASE_PATH=/app/data/parkeerhulp.db
    volumes:
      - parkeerhulp-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.parking.rule=Host(`parking.maikokuipers.nl`)"
      - "traefik.http.routers.parking.entrypoints=https"
      - "traefik.http.routers.parking.tls=true"
      - "traefik.http.routers.parking.tls.certresolver=letsencrypt"
      - "traefik.http.services.parking.loadbalancer.server.port=3000"
    restart: unless-stopped
volumes:
  parkeerhulp-data:
